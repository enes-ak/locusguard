schema_version: "1.0"
locusguard_compat: ">=0.1.0,<1.0.0"

locus:
  id: SMN2
  name: "Survival of Motor Neuron 2"
  gene_family: SMN
  paralogs: [SMN1]
  clinical_relevance: "SMN2 copy number modifies SMA severity"

reference: grch38

coordinates:
  primary:
    chrom: chr5
    start: 70049523
    end: 70078522
  paralogs:
    SMN1: {chrom: chr5, start: 70924941, end: 70953012}

critical_regions:
  - {name: exon_7, chrom: chr5, start: 70076500, end: 70076560, required_coverage: 15}
  - {name: exon_8, chrom: chr5, start: 70077000, end: 70078522, required_coverage: 15}

psvs:
  - name: "c.840C>T"
    chrom: chr5
    pos: 70076526
    alleles: {SMN1: C, SMN2: T}
    exon: 7
    discriminating_power: high
    notes: "Canonical SMN1/SMN2 exon 7 discriminator; verified against GRCh38.p0"
  - name: "c.888+11A>G"
    chrom: chr5
    pos: 70076674
    alleles: {SMN1: A, SMN2: G}
    exon: 7
    discriminating_power: high
    notes: "Intron 7 PSV (SMN2-side mirror of SMN1 chr5:70952094); verified via samtools faidx against GRCh38.p0"
  - name: "intron7_PSV_70076789"
    chrom: chr5
    pos: 70076789
    alleles: {SMN1: A, SMN2: G}
    exon: 7
    discriminating_power: high
    notes: "Intron 7 PSV (SMN2-side mirror of SMN1 chr5:70952209); verified via samtools faidx against GRCh38.p0"
  - name: "c.*239C>T"
    chrom: chr5
    pos: 70077254
    alleles: {SMN1: G, SMN2: A}
    exon: 8
    discriminating_power: high
    notes: "Exon 8 3'UTR PSV (SMN2-side mirror of SMN1 chr5:70952674); verified via samtools faidx against GRCh38.p0"

control_regions:
  - {name: chr5_p_arm_12M, chrom: chr5, start: 12000000, end: 12005000}
  - {name: chr5_mid_85M, chrom: chr5, start: 85000000, end: 85005000}
  - {name: chr5_q_arm_130M, chrom: chr5, start: 130000000, end: 130005000}

copy_number:
  expected_total: 4
  individual_range: [0, 4]
  estimation_method: depth_ratio

evidence_weights:
  default:
    psv_match: 0.40
    haplotype_consistency: 0.25
    mapq_pattern: 0.10
    softclip: 0.05
    unique_kmer: 0.10
    coverage_ratio: 0.10
  profile_overrides:
    ont_wgs:
      psv_match: 0.35
      haplotype_consistency: 0.30
      coverage_ratio: 0.10
      cap_confidence: 1.0
      enable: [long_haplotype, multi_psv_phasing, cn_estimation]
    short_read_wgs:
      psv_match: 0.45
      haplotype_consistency: 0.20
      coverage_ratio: 0.05
      cap_confidence: 0.90
      disable: [long_haplotype, multi_psv_phasing]
    short_read_wes:
      psv_match: 0.50
      haplotype_consistency: 0.15
      softclip: 0.15
      cap_confidence: 0.85
      disable: [coverage_ratio, long_haplotype, multi_psv_phasing, cn_estimation]

confidence_thresholds:
  resolved: 0.80
  probable: 0.50

validation:
  tested_samples: []
  tested_tech: [ont_r10.4]
  config_author: "LocusGuard core team"
  last_calibrated: "2026-04-18"
