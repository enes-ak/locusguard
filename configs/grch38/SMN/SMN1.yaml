schema_version: "1.0"
locusguard_compat: ">=0.1.0,<1.0.0"

locus:
  id: SMN1
  name: "Survival of Motor Neuron 1"
  gene_family: SMN
  paralogs: [SMN2]
  clinical_relevance: "Spinal Muscular Atrophy (5q13.2)"

reference: grch38

coordinates:
  primary:
    chrom: chr5
    start: 70924941
    end: 70953012
  paralogs:
    SMN2: {chrom: chr5, start: 70049523, end: 70078522}

critical_regions:
  - {name: exon_7, chrom: chr5, start: 70951941, end: 70952011, required_coverage: 15}
  - {name: exon_8, chrom: chr5, start: 70952437, end: 70953012, required_coverage: 15}

psvs:
  - name: "c.840C>T"
    chrom: chr5
    pos: 70951946
    alleles: {SMN1: C, SMN2: T}
    exon: 7
    discriminating_power: high
    notes: "Canonical SMN1/SMN2 exon 7 discriminator; verified against GRCh38.p0"
  - name: "c.888+11A>G"
    chrom: chr5
    pos: 70952094
    alleles: {SMN1: A, SMN2: G}
    exon: 7
    discriminating_power: high
    notes: "Intron 7 PSV (~44bp past exon 7 end); verified via samtools faidx against GRCh38.p0"
  - name: "intron7_PSV_70952209"
    chrom: chr5
    pos: 70952209
    alleles: {SMN1: A, SMN2: G}
    exon: 7
    discriminating_power: high
    notes: "Intron 7 PSV between exon 7 and exon 8; verified via samtools faidx against GRCh38.p0"
  - name: "c.*239C>T"
    chrom: chr5
    pos: 70952674
    alleles: {SMN1: G, SMN2: A}
    exon: 8
    discriminating_power: high
    notes: "Exon 8 3'UTR PSV (+strand ref G/A = mRNA C/T, SMN is on minus strand); verified via samtools faidx against GRCh38.p0"

gene_conversion:
  known_hotspots:
    - {name: exon_7_conversion, chrom: chr5, start: 70951900, end: 70952050}

evidence_weights:
  default:
    psv_match: 0.40
    haplotype_consistency: 0.25
    mapq_pattern: 0.10
    softclip: 0.05
    unique_kmer: 0.10
    coverage_ratio: 0.10
  profile_overrides:
    ont_wgs:
      psv_match: 0.35
      haplotype_consistency: 0.30
      coverage_ratio: 0.10
      cap_confidence: 1.0
      enable: [long_haplotype, multi_psv_phasing]
    short_read_wgs:
      psv_match: 0.45
      haplotype_consistency: 0.20
      coverage_ratio: 0.05
      cap_confidence: 0.90
      disable: [long_haplotype, multi_psv_phasing]
    short_read_wes:
      psv_match: 0.50
      haplotype_consistency: 0.15
      softclip: 0.15
      cap_confidence: 0.85
      disable: [coverage_ratio, long_haplotype, multi_psv_phasing]

confidence_thresholds:
  resolved: 0.80
  probable: 0.50

warnings:
  - condition: "gene_conversion_flag == true"
    message: "Gene conversion detected; orthogonal validation recommended"

validation:
  tested_samples: []
  tested_tech: [ont_r10.4]
  config_author: "LocusGuard core team"
  last_calibrated: "2026-04-18"

references:
  - {doi: "10.1016/j.ajhg.2020.05.011", note: "PSV catalog source"}
